<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
    <title>Controle de Vendas PRO</title>
    <link rel="manifest" href="manifest.json?v=5">
    <link rel="icon" href="icon-192.png?v=3" type="image/png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=3">
    <link rel="stylesheet" href="style.css?v=4">
    <meta name="theme-color" content="#061326">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vendas PRO">
    <meta name="format-detection" content="telephone=no">
</head>
<body>
<header class="topo">
    <div class="marca marca-so-emblema"><img src="yamaha-emblem.svg?v=3" alt="Yamaha" class="yamaha-emblema"></div>
</header>
<main>
    <section id="dashboard" class="tela ativa">
        <div class="perfil-boas-vindas">
            <label for="inputFotoPerfil" id="avatarPerfil" class="avatar-perfil" aria-label="Escolher foto de perfil" role="button" tabindex="0">
                <img id="fotoPerfil" alt="Foto de perfil" hidden>
                <span id="iniciaisPerfil">U</span>
                <small>📷</small>
            </label>
            <div class="perfil-textos">
                <button type="button" id="editarNomePerfil" class="nome-editavel" aria-label="Editar nome">
                    <h1 id="nomePerfil">Olá, Usuário! 👋</h1><span>✏️</span>
                </button>
                <p>Vamos acelerar mais um dia.</p>
            </div>
            <div class="data-hoje" id="dataHoje">Hoje</div>
        </div>
        <input type="file" id="inputFotoPerfil" accept="image/*" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none">
        <div class="cards">
            <div class="card card-azul"><span class="card-icone">💰</span><div><h3>Comissão do mês</h3><p id="dashboardComissao">R$ 0,00</p></div></div>
            <div class="card card-verde"><span class="card-icone">🛒</span><div><h3>Total vendido no mês</h3><p id="dashboardTotal">R$ 0,00</p></div></div>
            <div class="card card-roxo"><span class="card-icone">🧾</span><div><h3>Vendas do mês</h3><p id="dashboardQtd">0</p></div></div>
        </div>
        <div class="menu">
            <button onclick="abrirTela('novaVenda')"><span>＋</span><div><strong>Nova Venda</strong><small>Cadastre uma nova venda</small></div><b>›</b></button>
            <button onclick="abrirTela('historico')"><span>📋</span><div><strong>Histórico</strong><small>Veja suas vendas</small></div><b>›</b></button>
            <button onclick="abrirTela('relatorios')"><span>📊</span><div><strong>Relatórios</strong><small>Relatórios e análises</small></div><b>›</b></button>
            <button onclick="abrirTela('backup')"><span>☁️</span><div><strong>Backup</strong><small>Exportar ou importar dados</small></div><b>›</b></button>
        </div>
    </section>
    <section id="novaVenda" class="tela">
        <div class="barra"><button onclick="voltarDashboard()">←</button><h2>Nova Venda</h2></div>
        <form id="formVenda">
            <input type="text" id="cliente" placeholder="Nome do Cliente" required>
            <input type="tel" id="telefone" placeholder="Telefone" inputmode="numeric" maxlength="15" autocomplete="tel">
            <input type="text" id="produto" list="listaProdutos" placeholder="Pesquise ou digite o Produto/Modelo" autocomplete="off" required>
            <datalist id="listaProdutos"><option value="Factor"></option><option value="Factor DX"></option><option value="Fazer FZ15 ABS Connected"></option><option value="Fazer FZ25 Connected"></option><option value="Crosser 150 S ABS"></option><option value="Crosser 150 Z ABS"></option><option value="Lander Connected"></option><option value="R15 ABS"></option><option value="R3 ABS Connected"></option><option value="MT-03 Connected"></option><option value="MT-07 Connected"></option><option value="Ténéré 700"></option><option value="NMAX ABS Connected"></option><option value="XMAX 300 Connected"></option><option value="TT-R 230"></option><option value="Motor de Popa Yamaha 15 HP"></option><option value="Motor de Popa Yamaha 20 HP 4T"></option><option value="Motor de Popa Yamaha 25 HP"></option><option value="Motor de Popa Yamaha 30 HP"></option><option value="Motor de Popa Yamaha 40 HP 2T"></option><option value="Motor de Popa Yamaha 40 HP 4T"></option><option value="Motor de Popa Yamaha 60 HP 4T"></option><option value="Motor de Popa Yamaha 90 HP 4T"></option><option value="Motor de Popa Yamaha 115 HP 4T"></option><option value="Barco 6 m Fox Aquaforce"></option><option value="Reboque"></option><option value="Carta de Crédito Contemplada"></option><option value="Consórcio Yamaha"></option><option value="Outro Produto"></option></datalist>
            <select id="tipoVenda"><option>À Vista</option><option>Financiamento</option><option>Consórcio</option><option>Cartão</option></select>
            <input type="text" id="valorVenda" placeholder="Valor da Venda" inputmode="numeric" required>
            <input type="text" id="porcentagem" placeholder="% Comissão" inputmode="decimal" autocomplete="off" required>
            <input type="text" id="comissao" readonly placeholder="Comissão">
            <input type="date" id="dataVenda"><textarea id="observacao" placeholder="Observações"></textarea>
            <button type="submit">SALVAR VENDA</button>
        </form>
    </section>
    <section id="historico" class="tela"><div class="barra"><button onclick="voltarDashboard()">←</button><h2>Histórico</h2></div><input type="search" placeholder="Pesquisar cliente, produto ou telefone..." id="pesquisaHistorico"><div id="listaMeses"></div><div id="detalhesMes" style="display:none"><div class="barra"><button onclick="fecharDetalhes()">←</button><h2 id="tituloMes"></h2></div><div id="listaVendasMes"></div></div></section>
    <section id="relatorios" class="tela"><div class="barra"><button onclick="voltarDashboard()">←</button><h2>Relatórios</h2></div><label for="anoRelatorio"><strong>Ano</strong></label><select id="anoRelatorio"></select><label for="mesRelatorio"><strong>Mês</strong></label><select id="mesRelatorio"></select><button id="exportarPDFMes" class="btn-pdf">📄 <span>Exportar relatório mensal</span></button><button id="exportarPDFTodos" class="btn-pdf secundario">📚 <span>Exportar relatório anual completo</span></button><div id="resultadoRelatorio"></div></section>
    <section id="backup" class="tela"><div class="barra"><button onclick="voltarDashboard()">←</button><h2>Backup</h2></div><p class="texto-apoio">Salve uma cópia para guardar seus dados ao trocar de aparelho ou navegador.</p><button id="exportarBackup">Exportar Backup</button><button id="importarBackup">Importar Backup</button></section>
</main>
<nav class="bottom"><button onclick="abrirTela('dashboard')"><span>⌂</span><small>Início</small></button><button onclick="abrirTela('novaVenda')"><span>＋</span><small>Nova Venda</small></button><button onclick="abrirTela('historico')"><span>▤</span><small>Histórico</small></button><button onclick="abrirTela('relatorios')"><span>▥</span><small>Relatórios</small></button></nav>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script><script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>
<script src="pwa-enhancements.js?v=3"></script><script src="phone-mask.js?v=3"></script><script src="script.js?v=4"></script><script src="import-backup.js?v=2"></script><script src="app-upgrades.js?v=1"></script><script src="app-features.js?v=2"></script><script src="premium-ui.js?v=1"></script><script src="report-options-fix.js?v=5"></script><script src="firebase-integration.js?v=7"></script><script src="admin-controls.js?v=2"></script><script src="install-guide.js?v=1"></script><script src="admin-nav-fix.js?v=1"></script><script src="profile-settings.js?v=4"></script><script src="requirements-fix.js?v=2"></script>
<script>document.getElementById('dataHoje').textContent=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});</script>
</body>
</html>
