<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Samuel Comissões PRO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#0b3d91;

padding:20px;

}

.container{

max-width:900px;

margin:auto;

background:white;

border-radius:18px;

padding:20px;

box-shadow:0 15px 35px rgba(0,0,0,.25);

}

h1{

text-align:center;

color:#003b95;

margin-bottom:20px;

}

.dashboard{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:15px;

margin-bottom:20px;

}

.card{

background:#003b95;

color:white;

padding:15px;

border-radius:12px;

text-align:center;

}

.card h2{

font-size:15px;

margin-bottom:8px;

}

.card span{

font-size:24px;

font-weight:bold;

}

.formulario{

background:#f5f7fb;

padding:20px;

border-radius:15px;

margin-bottom:20px;

}

label{

display:block;

margin-top:10px;

font-weight:bold;

color:#003b95;

}

input,select{

width:100%;

padding:12px;

margin-top:6px;

border:1px solid #ccc;

border-radius:10px;

font-size:16px;

outline:none;

}

input:focus{

border-color:#003b95;

}

button{

margin-top:18px;

width:100%;

padding:14px;

background:#003b95;

color:white;

font-size:17px;

font-weight:bold;

border:none;

border-radius:12px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#00296b;

}

table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}

th{

background:#003b95;

color:white;

padding:12px;

}

td{

padding:10px;

border-bottom:1px solid #ddd;

font-size:14px;

}

.excluir{

background:red;

padding:8px;

border:none;

border-radius:6px;

color:white;

cursor:pointer;

}

.editar{

background:#ff9800;

padding:8px;

border:none;

border-radius:6px;

color:white;

cursor:pointer;

margin-right:5px;

}

@media(max-width:700px){

.dashboard{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="container">

<h1>

Samuel Comissões PRO

</h1>

<div class="dashboard">

<div class="card">

<h2>Total Vendido</h2>

<span id="totalVendido">

R$0,00

</span>

</div>

<div class="card">

<h2>Comissão</h2>

<span id="totalComissao">

R$0,00

</span>

</div>

<div class="card">

<h2>Vendas</h2>

<span id="quantidade">

0

</span>

</div>

</div>

<div class="formulario">

<label>

Cliente

</label>

<input id="cliente">

<label>

Produto

</label>

<select id="produto">

<option>Moto</option>

<option>Barco</option>

<option>Motor</option>

</select>

<label>

Modelo

</label>

<input id="modelo">

<label>

Valor da Venda

</label>

<input

id="valor"

placeholder="R$ 0,00">

<label>

Comissão %

</label>

<input

id="percentual"

value="1.5">
  <button onclick="salvarVenda()">

Salvar Venda

</button>

</div>

<h2 style="color:#003b95;margin-top:25px">

Histórico de Vendas

</h2>

<input

id="pesquisa"

placeholder="Pesquisar cliente..."

onkeyup="filtrar()">

<table>

<thead>

<tr>

<th>Data</th>

<th>Cliente</th>

<th>Produto</th>

<th>Modelo</th>

<th>Venda</th>

<th>Comissão</th>

<th>Ações</th>

</tr>

</thead>

<tbody id="listaVendas">

</tbody>

</table>

</div>

<script>

let vendas=

JSON.parse(

localStorage.getItem("samuel_vendas")

)||[];

let editando=-1;

function moeda(v){

return Number(v)

.toLocaleString(

"pt-BR",

{

style:"currency",

currency:"BRL"

}

);

}

function numero(txt){

return Number(

txt.replace(/\./g,"")

.replace(",",".")

.replace(/[^\d,]/g,"")

);

}

valor.addEventListener(

"input",

function(){

let n=this.value

.replace(/\D/g,"");

n=(Number(n)/100)

.toLocaleString(

"pt-BR",

{

minimumFractionDigits:2

}

);

this.value=n;

});
  function salvarVenda(){

let cliente=
document.getElementById("cliente").value.trim();

let produto=
document.getElementById("produto").value;

let modelo=
document.getElementById("modelo").value.trim();

let valorVenda=
numero(document.getElementById("valor").value);

let percentual=
parseFloat(document.getElementById("percentual").value.replace(",","."));

if(cliente==""||modelo==""||valorVenda<=0){

alert("Preencha todos os campos.");

return;

}

let comissao=

(valorVenda*percentual)/100;

let venda={

data:new Date().toLocaleDateString("pt-BR"),

cliente,

produto,

modelo,

valor:valorVenda,

percentual,

comissao

};

if(editando==-1){

vendas.push(venda);

}else{

vendas[editando]=venda;

editando=-1;

}

localStorage.setItem(

"samuel_vendas",

JSON.stringify(vendas)

);

limpar();

atualizarTabela();

}

function limpar(){

cliente.value="";

modelo.value="";

valor.value="";

percentual.value="1.5";

}
  function atualizarTabela(){

let lista=

document.getElementById("listaVendas");

lista.innerHTML="";

let totalVenda=0;

let totalComissao=0;

vendas.forEach((v,i)=>{

totalVenda+=v.valor;

totalComissao+=v.comissao;

lista.innerHTML+=`

<tr>

<td>${v.data}</td>

<td>${v.cliente}</td>

<td>${v.produto}</td>

<td>${v.modelo}</td>

<td>${moeda(v.valor)}</td>

<td>${moeda(v.comissao)}</td>

<td>

<button class="editar"

onclick="editarVenda(${i})">

Editar

</button>

<button class="excluir"

onclick="excluirVenda(${i})">

Excluir

</button>

</td>

</tr>

`;

});

document.getElementById("totalVendido").innerHTML=

moeda(totalVenda);

document.getElementById("totalComissao").innerHTML=

moeda(totalComissao);

document.getElementById("quantidade").innerHTML=

vendas.length;

}

function editarVenda(i){

let v=vendas[i];

cliente.value=v.cliente;

produto.value=v.produto;

modelo.value=v.modelo;

valor.value=v.valor.toLocaleString(

"pt-BR",

{minimumFractionDigits:2}

);

percentual.value=v.percentual;

editando=i;

}
  function excluirVenda(i){

if(confirm("Deseja excluir esta venda?")){

vendas.splice(i,1);

localStorage.setItem(

"samuel_vendas",

JSON.stringify(vendas)

);

atualizarTabela();

}

}

function filtrar(){

let texto=

document.getElementById("pesquisa")

.value

.toLowerCase();

let linhas=

document.querySelectorAll(

"#listaVendas tr"

);

linhas.forEach(linha=>{

if(

linha.innerText

.toLowerCase()

.includes(texto)

){

linha.style.display="";

}else{

linha.style.display="none";

}

});

}

atualizarTabela();

</script>

</body>

</html>
