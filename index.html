<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Samuel Comissões PRO</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#0b3d91;

background:linear-gradient(180deg,#114aa7,#07295d);

min-height:100vh;

padding:25px;

}

.container{

max-width:1200px;

margin:auto;

}

.topo{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

color:#fff;

}

.topo h1{

font-size:34px;

font-weight:700;

}

.cards{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

margin-bottom:25px;

}

.card{

background:white;

border-radius:18px;

padding:20px;

box-shadow:0 15px 35px rgba(0,0,0,.18);

}

.card h3{

font-size:15px;

color:#666;

margin-bottom:10px;

}

.card h2{

color:#114aa7;

font-size:30px;

}

.formulario{

background:white;

border-radius:18px;

padding:25px;

box-shadow:0 15px 35px rgba(0,0,0,.18);

margin-bottom:25px;

}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:18px;

}

label{

font-weight:600;

color:#114aa7;

display:block;

margin-bottom:6px;

}

input,select{

width:100%;

padding:14px;

border-radius:12px;

border:1px solid #ccc;

font-size:16px;

margin-bottom:15px;

outline:none;

}

input:focus{

border-color:#114aa7;

}

button{

background:#114aa7;

color:white;

padding:15px;

border:none;

border-radius:12px;

font-size:17px;

font-weight:bold;

cursor:pointer;

width:100%;

}

button:hover{

background:#0b377d;

}
  .historico{

background:white;

border-radius:18px;

padding:25px;

box-shadow:0 15px 35px rgba(0,0,0,.18);

}

table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}

th{

background:#114aa7;

color:white;

padding:14px;

font-size:15px;

}

td{

padding:12px;

border-bottom:1px solid #e5e5e5;

font-size:14px;

text-align:center;

}

.btnExcluir{

background:#e53935;

padding:8px 14px;

border-radius:8px;

border:none;

color:white;

cursor:pointer;

}

.btnEditar{

background:#ff9800;

padding:8px 14px;

border-radius:8px;

border:none;

color:white;

cursor:pointer;

margin-right:6px;

}

.pesquisa{

margin-bottom:15px;

}

@media(max-width:900px){

.cards{

grid-template-columns:1fr 1fr;

}

.grid{

grid-template-columns:1fr;

}

}

@media(max-width:600px){

.cards{

grid-template-columns:1fr;

}

.topo{

flex-direction:column;

align-items:flex-start;

gap:10px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="topo">

<h1>Samuel Comissões PRO</h1>

</div>

<div class="cards">

<div class="card">

<h3>Total Vendido</h3>

<h2 id="totalVendido">R$ 0,00</h2>

</div>

<div class="card">

<h3>Comissão</h3>

<h2 id="totalComissao">R$ 0,00</h2>

</div>

<div class="card">

<h3>Vendas</h3>

<h2 id="qtdVendas">0</h2>

</div>

<div class="card">

<h3>Ticket Médio</h3>

<h2 id="ticketMedio">R$ 0,00</h2>

</div>
</div>

<div class="formulario">

<div class="grid">

<div>

<label>Cliente</label>

<input id="cliente" type="text" placeholder="Nome do cliente">

</div>

<div>

<label>Produto</label>

<select id="produto">

<option>Moto</option>

<option>Barco</option>

<option>Motor</option>

</select>

</div>

<div>

<label>Modelo</label>

<input id="modelo" type="text" placeholder="Ex.: Lander 250">

</div>

<div>

<label>Valor da Venda</label>

<input id="valor" type="text" placeholder="R$ 0,00">

</div>

<div>

<label>Comissão (%)</label>

<input id="percentual" type="number" value="1.5" step="0.1">

</div>

<div>

<label>Data</label>

<input id="data" type="date">

</div>

</div>

<button onclick="salvarVenda()">

Salvar Venda

</button>

</div>

<div class="historico">

<h2>Histórico de Vendas</h2>

<input
class="pesquisa"
id="pesquisa"
type="text"
placeholder="Pesquisar cliente ou modelo..."
onkeyup="filtrarHistorico()">

<table>

<thead>

<tr>

<th>Data</th>

<th>Cliente</th>

<th>Produto</th>

<th>Modelo</th>

<th>Venda</th>

<th>Comissão</th>

<th>Ações</th>

</tr>

</thead>

<tbody id="tabelaVendas">

</tbody>

</table>

</div>

<script>

let vendas = JSON.parse(localStorage.getItem("samuel_vendas")) || [];
  function formatarMoeda(valor){

return valor.toLocaleString("pt-BR",{
style:"currency",
currency:"BRL"
});

}

function converterValor(texto){

texto=texto.replace(/\./g,"");
texto=texto.replace(",",".");
texto=texto.replace(/[^\d.]/g,"");

return parseFloat(texto)||0;

}

document.getElementById("valor")
.addEventListener("input",function(){

let numeros=this.value.replace(/\D/g,"");

if(numeros==""){

this.value="";

return;

}

this.value=(Number(numeros)/100)

.toLocaleString("pt-BR",{

minimumFractionDigits:2,

maximumFractionDigits:2

});

});

function salvarVenda(){

let cliente=document.getElementById("cliente").value.trim();

let produto=document.getElementById("produto").value;

let modelo=document.getElementById("modelo").value.trim();

let valor=converterValor(

document.getElementById("valor").value

);

let percentual=parseFloat(

document.getElementById("percentual").value

);

let data=document.getElementById("data").value;

if(cliente==""||modelo==""||valor<=0){

alert("Preencha todos os campos.");

return;

}

let comissao=(valor*percentual)/100;

vendas.push({

cliente,

produto,

modelo,

valor,

percentual,

comissao,

data

});

localStorage.setItem(

"samuel_vendas",

JSON.stringify(vendas)

);

atualizarDashboard();

atualizarTabela();

limparCampos();

}
  function atualizarDashboard(){

let totalVenda=0;

let totalComissao=0;

vendas.forEach(v=>{

totalVenda+=v.valor;

totalComissao+=v.comissao;

});

document.getElementById("totalVendido").innerHTML=

formatarMoeda(totalVenda);

document.getElementById("totalComissao").innerHTML=

formatarMoeda(totalComissao);

document.getElementById("qtdVendas").innerHTML=

vendas.length;

document.getElementById("ticketMedio").innerHTML=

formatarMoeda(

vendas.length?

totalVenda/vendas.length:0

);

}

function atualizarTabela(){

const tbody=

document.getElementById("tabelaVendas");

tbody.innerHTML="";

vendas.forEach((v,i)=>{

tbody.innerHTML+=`

<tr>

<td>${v.data}</td>

<td>${v.cliente}</td>

<td>${v.produto}</td>

<td>${v.modelo}</td>

<td>${formatarMoeda(v.valor)}</td>

<td>${formatarMoeda(v.comissao)}</td>

<td>

<button class="btnEditar">

Editar

</button>

<button

class="btnExcluir"

onclick="excluirVenda(${i})">

Excluir

</button>

</td>

</tr>

`;

});

}

function excluirVenda(i){

if(confirm("Excluir venda?")){

vendas.splice(i,1);

localStorage.setItem(

"samuel_vendas",

JSON.stringify(vendas)

);

atualizarDashboard();

atualizarTabela();

}

}

function limparCampos(){

cliente.value="";

modelo.value="";

valor.value="";

percentual.value="1.5";

}
  function filtrarHistorico(){

let texto=

document.getElementById("pesquisa")

.value

.toLowerCase();

document.querySelectorAll(

"#tabelaVendas tr"

).forEach(linha=>{

linha.style.display=

linha.innerText

.toLowerCase()

.includes(texto)

? ""

: "none";

});

}

document.getElementById("data").value=

new Date()

.toISOString()

.split("T")[0];

atualizarDashboard();

atualizarTabela();

</script>

</body>

</html>
