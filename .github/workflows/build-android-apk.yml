name: Gerar APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar SDK Android 35
        run: yes | sdkmanager --licenses >/dev/null && sdkmanager 'platform-tools' 'platforms;android-35' 'build-tools;35.0.0'

      - name: Configurar Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Compilar APK
        working-directory: android-app
        run: gradle --no-daemon clean assembleDebug

      - name: Preparar APK final
        run: |
          mkdir -p downloads
          cp android-app/app/build/outputs/apk/debug/app-debug.apk downloads/Samuel-Comissoes-PRO.apk
          test -s downloads/Samuel-Comissoes-PRO.apk

      - name: Verificar APK
        run: |
          set -e
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt"
          SIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          "$AAPT" dump badging downloads/Samuel-Comissoes-PRO.apk | tee apk-badging.txt
          "$SIGNER" verify --verbose --print-certs downloads/Samuel-Comissoes-PRO.apk | tee apk-signature.txt
          unzip -t downloads/Samuel-Comissoes-PRO.apk | tee apk-integrity.txt
          sha256sum downloads/Samuel-Comissoes-PRO.apk | tee Samuel-Comissoes-PRO.sha256

      - name: Publicar APK no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f downloads/Samuel-Comissoes-PRO.apk
          git diff --cached --quiet && exit 0
          git commit -m "Atualizar APK para download direto"
          git push

      - name: Disponibilizar APK verificado
        uses: actions/upload-artifact@v4
        with:
          name: Samuel-Comissoes-PRO-Android-v3-VERIFICADO
          path: |
            downloads/Samuel-Comissoes-PRO.apk
            Samuel-Comissoes-PRO.sha256
            apk-badging.txt
            apk-signature.txt
            apk-integrity.txt
          retention-days: 30
          if-no-files-found: error