name: Gerar APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'android-app/**'
      - '.github/workflows/build-android-apk.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar SDK Android 35
        run: yes | sdkmanager --licenses >/dev/null && sdkmanager 'platform-tools' 'platforms;android-35' 'build-tools;35.0.0'

      - name: Configurar Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Compilar APK de teste
        working-directory: android-app
        run: gradle --no-daemon clean assembleDebug

      - name: Renomear APK
        run: cp android-app/app/build/outputs/apk/debug/app-debug.apk Samuel-Comissoes-PRO.apk

      - name: Disponibilizar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: Samuel-Comissoes-PRO-APK
          path: Samuel-Comissoes-PRO.apk
          retention-days: 30
          if-no-files-found: error
