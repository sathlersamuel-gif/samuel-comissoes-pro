name: Vistoria automática do aplicativo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vistoria:
    name: Verificar versão antes de aprovar
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Executar portão de qualidade
        run: node scripts/quality-gate.js

      - name: Resumo da vistoria
        if: always()
        run: |
          echo "## Vistoria automática" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Versão aprovada nas verificações automáticas." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Versão reprovada. Não deve ser anunciada como corrigida." >> "$GITHUB_STEP_SUMMARY"
          fi
